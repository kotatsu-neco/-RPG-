<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>待宵物語 RPG Engine v3.4 Single Single File</title>
  <style>
*,
*::before,
*::after {
  box-sizing: border-box;
  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
}

:root {
  --bg-page: #1f2429;
  --frame: #4a4a4a;
  --paper: #d8d5cf;
  --ink: #222222;
  --dialog-bg: #222938;
  --dialog-border: #c6a35f;
  --choice-bg: #beb8ae;
  --choice-selected: #cfc3a4;
}

html,
body {
  margin: 0;
  padding: 0;
  width: 100%;
  min-height: 100%;
  background: var(--bg-page);
  color: var(--ink);
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
  overflow: hidden;
  overscroll-behavior: none;
  touch-action: manipulation;
}

#app {
  width: 100vw;
  height: var(--app-height, 100svh);
  min-height: var(--app-height, 100svh);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: max(env(safe-area-inset-top), 4px) 4px max(env(safe-area-inset-bottom), 4px);
  background: var(--bg-page);
}

#game-shell {
  position: relative;
  width: min(100vw, 390px);
  height: 100%;
  max-height: var(--app-height, 100svh);
  overflow: hidden;
  background: #14171b;
  image-rendering: pixelated;
}

#game-canvas {
  position: absolute;
  left: 50%;
  top: 4px;
  transform: translateX(-50%);
  width: min(100%, calc((var(--app-height, 100svh) - 156px) * 2 / 3));
  height: auto;
  aspect-ratio: 2 / 3;
  display: block;
  background: #5e7a4e;
  border: 2px solid var(--frame);
  image-rendering: pixelated;
}

#debug-panel {
  position: absolute;
  left: 8px;
  top: 8px;
  z-index: 20;
  display: grid;
  gap: 2px;
  padding: 6px 8px;
  color: #f5efe2;
  background: rgba(34, 41, 56, 0.82);
  border: 1px solid rgba(198, 163, 95, 0.85);
  font-size: 10px;
  line-height: 1.35;
  pointer-events: none;
}

#touch-controls {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 10px;
  z-index: 120;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  padding: 0 18px;
  pointer-events: none;
}

.dpad {
  position: relative;
  width: 126px;
  height: 126px;
  flex: 0 0 126px;
  pointer-events: auto;
}

.dpad button,
#action-button {
  border: 2px solid var(--frame);
  background: rgba(216, 213, 207, 0.96);
  color: var(--ink);
  font-weight: 700;
  border-radius: 8px;
  box-shadow: 0 3px 0 rgba(0, 0, 0, 0.25);
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

.dpad button {
  position: absolute;
  width: 42px;
  height: 42px;
  padding: 0;
  font-size: 18px;
}

.dpad [data-dir="up"] {
  left: 42px;
  top: 0;
}

.dpad [data-dir="left"] {
  left: 0;
  top: 42px;
}

.dpad [data-dir="right"] {
  right: 0;
  top: 42px;
}

.dpad [data-dir="down"] {
  left: 42px;
  bottom: 0;
}

#action-button {
  position: relative;
  width: 82px;
  height: 82px;
  border-radius: 50%;
  pointer-events: auto;
  font-size: 17px;
}

#action-button.action-talk {
  background: rgba(207, 195, 164, 0.96);
}

#action-button.action-enter {
  background: rgba(198, 163, 95, 0.96);
}

#action-button.action-exit {
  background: rgba(190, 184, 174, 0.96);
}

.dpad button:active,
#action-button:active {
  transform: translateY(2px);
  box-shadow: 0 1px 0 rgba(0, 0, 0, 0.25);
}

#dialog-layer {
  position: absolute;
  left: 6%;
  right: 6%;
  bottom: 116px;
  z-index: 90;
  pointer-events: auto;
}

#nameplate {
  display: inline-block;
  min-width: 88px;
  padding: 5px 12px;
  margin-left: 8px;
  margin-bottom: -1px;
  color: #f5efe2;
  background: var(--dialog-bg);
  border: 2px solid var(--dialog-border);
  border-bottom: none;
  font-size: 14px;
  line-height: 1.2;
}

#dialog-window {
  position: relative;
  min-height: 88px;
  padding: 14px 16px 20px;
  color: #f5efe2;
  background: var(--dialog-bg);
  border: 2px solid var(--dialog-border);
  box-shadow: 0 4px 0 rgba(0, 0, 0, 0.25);
  pointer-events: auto;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

#dialog-text {
  margin: 0;
  font-size: 15px;
  line-height: 1.65;
  letter-spacing: 0.02em;
}

#next-marker {
  position: absolute;
  right: 12px;
  bottom: 6px;
  font-size: 12px;
  color: #f5efe2;
  animation: blink 1s steps(2, end) infinite;
}

#choice-box {
  margin-top: 8px;
  display: grid;
  gap: 6px;
}

.choice {
  pointer-events: auto;
  padding: 7px 10px;
  color: var(--ink);
  background: #d8d5cf;
  border: 1px solid var(--frame);
  font-size: 14px;
  text-align: left;
}

.choice.selected {
  background: var(--choice-selected);
  font-weight: 700;
}

.choice.selected::before {
  content: "▶ ";
}

#wide-tap-catcher {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: 52%;
  z-index: 70;
  padding: 0;
  margin: 0;
  border: none;
  background: transparent;
  pointer-events: auto;
  -webkit-tap-highlight-color: transparent;
}

#notice-layer {
  position: absolute;
  left: 8%;
  right: 8%;
  top: 56px;
  z-index: 120;
  display: block;
  padding: 0;
  border: 0;
  background: transparent;
  pointer-events: auto;
  -webkit-tap-highlight-color: transparent;
}

#notice-window {
  display: block;
  position: relative;
  padding: 10px 14px 18px;
  color: #f5efe2;
  background: rgba(34, 41, 56, 0.96);
  border: 2px solid var(--dialog-border);
  box-shadow: 0 4px 0 rgba(0, 0, 0, 0.25);
  font-size: 14px;
  line-height: 1.45;
  text-align: center;
}

#notice-window::after {
  content: "タップで閉じる";
  position: absolute;
  right: 14px;
  bottom: 5px;
  font-size: 10px;
  opacity: 0.78;
}

.hidden {
  display: none !important;
}

body.dialogue-open:not(.choice-open):not(.notice-open) #touch-controls,
body.notice-open #touch-controls {
  display: none !important;
}

body.choice-open #touch-controls {
  display: flex !important;
  z-index: 140;
}

body:not(.dialogue-open):not(.notice-open) #wide-tap-catcher,
body.choice-open #wide-tap-catcher {
  display: none !important;
}

body.dialogue-open:not(.choice-open) #wide-tap-catcher,
body.notice-open #wide-tap-catcher {
  display: block !important;
}

body.choice-open .dpad [data-dir="left"],
body.choice-open .dpad [data-dir="right"] {
  opacity: 0.38;
}

@keyframes blink {
  50% {
    opacity: 0.25;
  }
}

@media (max-height: 680px) {
  #game-canvas {
    top: 4px;
    width: min(100%, calc((var(--app-height, 100svh) - 140px) * 2 / 3));
  }

  #dialog-layer {
    bottom: 102px;
  }

  #touch-controls {
    bottom: 8px;
    padding: 0 20px;
  }

  .dpad {
    width: 112px;
    height: 112px;
    flex-basis: 112px;
  }

  .dpad button {
    width: 38px;
    height: 38px;
    font-size: 16px;
  }

  .dpad [data-dir="up"],
  .dpad [data-dir="down"] {
    left: 37px;
  }

  .dpad [data-dir="left"],
  .dpad [data-dir="right"] {
    top: 37px;
  }

  #action-button {
    width: 76px;
    height: 76px;
    font-size: 16px;
  }
}


/* v2.1: アクション対象なし */
#action-button.action-idle {
  opacity: 0.48;
  background: rgba(216, 213, 207, 0.58);
}

#action-button.action-idle:active {
  transform: none;
  box-shadow: 0 3px 0 rgba(0, 0, 0, 0.25);
}


/* v2.3: Main menu foundation */

#menu-button {
  position: absolute;
  right: 10px;
  top: 8px;
  z-index: 35;
  width: 42px;
  height: 36px;
  border: 2px solid var(--frame);
  border-radius: 8px;
  background: rgba(216, 213, 207, 0.94);
  color: var(--ink);
  font-size: 22px;
  font-weight: 700;
  line-height: 1;
  box-shadow: 0 3px 0 rgba(0, 0, 0, 0.25);
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

#menu-button:active,
#menu-close-button:active,
.menu-tab:active {
  transform: translateY(1px);
}

#menu-layer {
  position: absolute;
  inset: 0;
  z-index: 200;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: max(env(safe-area-inset-top), 14px) 14px 14px;
  background: rgba(20, 23, 27, 0.62);
}

#menu-window {
  width: min(100%, 350px);
  height: min(520px, calc(var(--app-height, 100svh) - 32px));
  max-height: calc(var(--app-height, 100svh) - 32px);
  display: grid;
  grid-template-rows: auto auto 1fr;
  overflow: hidden;
  color: #f5efe2;
  background: rgba(34, 41, 56, 0.98);
  border: 2px solid var(--dialog-border);
  box-shadow: 0 8px 0 rgba(0, 0, 0, 0.28);
}

#menu-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 10px 12px;
  border-bottom: 1px solid rgba(198, 163, 95, 0.55);
}

#menu-header h1 {
  margin: 0;
  font-size: 17px;
  letter-spacing: 0.08em;
}

#menu-close-button {
  width: 36px;
  height: 32px;
  border: 1px solid var(--dialog-border);
  border-radius: 6px;
  background: rgba(216, 213, 207, 0.95);
  color: var(--ink);
  font-size: 20px;
  font-weight: 700;
}

#menu-tabs {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  padding: 8px;
  background: rgba(0, 0, 0, 0.16);
}

.menu-tab {
  min-height: 36px;
  padding: 4px 2px;
  border: 1px solid rgba(198, 163, 95, 0.45);
  background: rgba(216, 213, 207, 0.15);
  color: #f5efe2;
  font-size: 12px;
  font-weight: 700;
  border-radius: 5px;
  -webkit-tap-highlight-color: transparent;
}

.menu-tab.selected {
  background: rgba(198, 163, 95, 0.75);
  color: #1f2429;
}

#menu-content {
  min-height: 0;
  overflow: auto;
  padding: 12px;
  font-size: 14px;
  line-height: 1.55;
}

.menu-panel-title {
  margin: 0 0 8px;
  font-size: 15px;
  color: #f5efe2;
}

.menu-list {
  display: grid;
  gap: 7px;
  margin: 0;
  padding: 0;
  list-style: none;
}

.menu-list-item {
  padding: 8px 10px;
  border: 1px solid rgba(198, 163, 95, 0.38);
  background: rgba(216, 213, 207, 0.09);
}

.menu-muted {
  opacity: 0.75;
}

.menu-status-grid {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 6px 14px;
  padding: 10px;
  border: 1px solid rgba(198, 163, 95, 0.38);
  background: rgba(216, 213, 207, 0.09);
}

body.menu-open #touch-controls,
body.menu-open #dialog-layer,
body.menu-open #notice-layer,
body.menu-open #wide-tap-catcher {
  display: none !important;
}

body.dialogue-open #menu-button,
body.notice-open #menu-button {
  display: none !important;
}

@media (max-height: 680px) {
  #menu-window {
    height: min(450px, calc(var(--app-height, 100svh) - 20px));
    max-height: calc(var(--app-height, 100svh) - 20px);
  }

  #menu-content {
    min-height: 0;
  }

  .menu-tab {
    min-height: 32px;
    font-size: 11px;
  }
}


/* v2.5: 選択肢表示中は操作キーと会話ウィンドウが重ならないよう上へ逃がす */
body.choice-open #dialog-layer {
  bottom: 150px;
}

body.choice-open #touch-controls {
  display: flex !important;
  z-index: 120;
}

body.choice-open #action-button {
  z-index: 130;
}

@media (max-height: 680px) {
  body.choice-open #dialog-layer {
    bottom: 136px;
  }
}


/* v3.3: key item document reading */
.menu-document {
  display: grid;
  gap: 10px;
}

.menu-document-body {
  white-space: pre-wrap;
  padding: 12px;
  color: #2a2118;
  background: rgba(245, 239, 226, 0.95);
  border: 2px solid rgba(198, 163, 95, 0.85);
  line-height: 1.7;
}

.menu-action-button {
  min-height: 34px;
  padding: 7px 12px;
  border: 1px solid var(--dialog-border);
  border-radius: 6px;
  background: rgba(216, 213, 207, 0.95);
  color: var(--ink);
  font-weight: 700;
  -webkit-tap-highlight-color: transparent;
}

.menu-objective {
  margin: 0 0 10px;
  padding: 8px 10px;
  border: 1px solid rgba(198, 163, 95, 0.38);
  background: rgba(216, 213, 207, 0.09);
}

  </style>

<body>

  <main id="app">
    <section id="game-shell" aria-label="待宵物語 RPG Engine v3.0">
      <canvas id="game-canvas" width="320" height="480" aria-label="ゲーム画面"></canvas>

      <aside id="debug-panel">
        <strong>v3.0 TileMap</strong>
        <span>汎用RPG基盤</span>
      </aside>

      <button id="menu-button" type="button" aria-label="メニューを開く">☰</button>

      <section id="menu-layer" class="hidden" aria-label="メニュー">
        <div id="menu-window">
          <header id="menu-header">
            <h1>メニュー</h1>
            <button id="menu-close-button" type="button" aria-label="メニューを閉じる">×</button>
          </header>

          <div id="menu-tabs" role="tablist" aria-label="メニュー項目">
            <button class="menu-tab selected" data-menu-tab="items" type="button">アイテム</button>
            <button class="menu-tab" data-menu-tab="keyItems" type="button">大事なもの</button>
            <button class="menu-tab" data-menu-tab="equipment" type="button">装備</button>
            <button class="menu-tab" data-menu-tab="status" type="button">ステータス</button>
            <button class="menu-tab" data-menu-tab="save" type="button">記録</button>
            <button class="menu-tab" data-menu-tab="settings" type="button">設定</button>
          </div>

          <div id="menu-content" aria-live="polite"></div>
        </div>
      </section>

      <div id="dialog-layer" class="hidden" aria-live="polite">
        <div id="nameplate"></div>
        <div id="dialog-window">
          <p id="dialog-text"></p>
          <div id="choice-box" class="hidden" role="group" aria-label="会話選択肢"></div>
          <span id="next-marker">▼</span>
        </div>
      </div>

      <button id="wide-tap-catcher" class="hidden" type="button" aria-label="会話または通知を進める"></button>

      <button id="notice-layer" class="hidden" type="button" aria-live="polite" aria-label="通知を閉じる">
        <span id="notice-window"></span>
      </button>

      <nav id="touch-controls" aria-label="移動操作">
        <div class="dpad" aria-label="十字キー">
          <button data-dir="up" aria-label="上" type="button">▲</button>
          <button data-dir="left" aria-label="左" type="button">◀</button>
          <button data-dir="right" aria-label="右" type="button">▶</button>
          <button data-dir="down" aria-label="下" type="button">▼</button>
        </div>
        <button id="action-button" aria-label="決定" type="button">決定</button>
      </nav>
    </section>
  </main>

  

  <script type="module">

// ===== src/engine/constants.js =====
const ENGINE_VERSION = "2.0";

const TILE_SIZE = 16;
const CANVAS_COLS = 20;
const CANVAS_ROWS = 30;

const DIRECTIONS = {
  UP: "up",
  DOWN: "down",
  LEFT: "left",
  RIGHT: "right",
};

function directionDelta(direction) {
  return {
    up: [0, -1],
    down: [0, 1],
    left: [-1, 0],
    right: [1, 0],
  }[direction] || [0, 0];
}


// ===== src/engine/AssetLoader.js =====
class AssetLoader {
  constructor({ version = "2.0" } = {}) {
    this.version = version;
    this.cache = new Map();
  }

  cacheBust(path) {
    return `${path}?v=${this.version}`;
  }

  async loadJSON(path) {
    const response = await fetch(this.cacheBust(path));
    if (!response.ok) {
      throw new Error(`Failed to load JSON: ${path}`);
    }
    return response.json();
  }

  async loadImage(path) {
    if (this.cache.has(path)) {
      return this.cache.get(path);
    }

    const promise = new Promise((resolve) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = () => resolve(null);
      img.src = this.cacheBust(path);
    });

    this.cache.set(path, promise);
    return promise;
  }

  async loadImageList(paths) {
    return Promise.all(paths.map((path) => this.loadImage(path)));
  }
}


// ===== src/engine/InputController.js =====

class InputController {
  constructor({ onDirection, onAction, onWideTap }) {
    this.onDirection = onDirection;
    this.onAction = onAction;
    this.onWideTap = onWideTap;
  }

  bind() {
    window.addEventListener("keydown", (event) => this.handleKeydown(event));

    document.querySelectorAll(".dpad button").forEach((button) => {
      button.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        this.onDirection(button.dataset.dir);
      });
    });

    const actionButton = document.getElementById("action-button");
    let suppressNextClick = false;

    actionButton.addEventListener("touchend", (event) => {
      event.preventDefault();
      event.stopPropagation();
      suppressNextClick = true;
      this.onAction();
      setTimeout(() => {
        suppressNextClick = false;
      }, 300);
    }, { passive: false });

    actionButton.addEventListener("click", (event) => {
      event.preventDefault();
      event.stopPropagation();
      if (suppressNextClick) return;
      this.onAction();
    });

    const wideTap = document.getElementById("wide-tap-catcher");
    wideTap.addEventListener("click", (event) => {
      event.preventDefault();
      this.onWideTap();
    });
    wideTap.addEventListener("touchend", (event) => {
      event.preventDefault();
      this.onWideTap();
    }, { passive: false });

    const noticeLayer = document.getElementById("notice-layer");
    noticeLayer.addEventListener("click", (event) => {
      event.preventDefault();
      this.onWideTap();
    });
    noticeLayer.addEventListener("touchend", (event) => {
      event.preventDefault();
      this.onWideTap();
    }, { passive: false });

    const dialogWindow = document.getElementById("dialog-window");
    dialogWindow.addEventListener("click", (event) => {
      if (event.target.closest(".choice")) return;
      event.preventDefault();
      this.onWideTap();
    });
    dialogWindow.addEventListener("touchend", (event) => {
      if (event.target.closest(".choice")) return;
      event.preventDefault();
      this.onWideTap();
    }, { passive: false });
  }

  handleKeydown(event) {
    const handledKeys = ["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "w", "a", "s", "d", "Enter", " "];
    if (handledKeys.includes(event.key)) {
      event.preventDefault();
    }

    if (event.key === "Enter" || event.key === " ") {
      this.onAction();
      return;
    }

    const direction = this.keyToDirection(event.key);
    if (direction) {
      this.onDirection(direction);
    }
  }

  keyToDirection(key) {
    return {
      ArrowUp: DIRECTIONS.UP,
      ArrowDown: DIRECTIONS.DOWN,
      ArrowLeft: DIRECTIONS.LEFT,
      ArrowRight: DIRECTIONS.RIGHT,
      w: DIRECTIONS.UP,
      s: DIRECTIONS.DOWN,
      a: DIRECTIONS.LEFT,
      d: DIRECTIONS.RIGHT,
    }[key] || null;
  }
}


// ===== src/engine/UIManager.js =====
class UIManager {
  constructor() {
    this.dialogLayer = document.getElementById("dialog-layer");
    this.nameplate = document.getElementById("nameplate");
    this.dialogText = document.getElementById("dialog-text");
    this.choiceBox = document.getElementById("choice-box");
    this.noticeLayer = document.getElementById("notice-layer");
    this.noticeWindow = document.getElementById("notice-window");
    this.actionButton = document.getElementById("action-button");
    this.wideTapCatcher = document.getElementById("wide-tap-catcher");
    this.touchControls = document.getElementById("touch-controls");
    this.debugVersion = document.querySelector("#debug-panel strong");
  }

  setDebugVersion(text) {
    if (this.debugVersion) {
      this.debugVersion.textContent = text;
    }
  }

  showDialogue({ speaker, text }) {
    this.nameplate.textContent = speaker;
    this.dialogText.textContent = text;
    this.choiceBox.classList.add("hidden");
    this.dialogLayer.classList.remove("hidden");
  }

  updateDialogueText(text) {
    this.dialogText.textContent = text;
  }

  showChoices(choices, selectedIndex, onSelect) {
    this.choiceBox.innerHTML = "";

    choices.forEach((choice, index) => {
      const button = document.createElement("button");
      button.type = "button";
      button.className = `choice ${index === selectedIndex ? "selected" : ""}`;
      button.textContent = choice;
      button.addEventListener("click", (event) => {
        event.stopPropagation();
        onSelect(index);
      });
      this.choiceBox.appendChild(button);
    });

    this.dialogText.textContent = "どうする？";
    this.choiceBox.classList.remove("hidden");
  }

  syncChoiceSelection(selectedIndex) {
    Array.from(this.choiceBox.querySelectorAll(".choice")).forEach((button, index) => {
      button.classList.toggle("selected", index === selectedIndex);
    });
  }

  hideDialogue() {
    this.choiceBox.classList.add("hidden");
    this.dialogLayer.classList.add("hidden");
  }

  showNotice(text) {
    this.noticeWindow.textContent = text;
    this.noticeLayer.classList.remove("hidden");
  }

  hideNotice() {
    this.noticeLayer.classList.add("hidden");
  }

  setActionButton(label, className = "") {
    this.actionButton.textContent = label;
    this.actionButton.className = className;
  }

  syncBodyState({ dialogueOpen, choiceOpen, noticeOpen }) {
    document.body.classList.toggle("dialogue-open", dialogueOpen);
    document.body.classList.toggle("choice-open", choiceOpen);
    document.body.classList.toggle("notice-open", noticeOpen);

    const showWideTap = (dialogueOpen && !choiceOpen) || noticeOpen;
    this.wideTapCatcher.classList.toggle("hidden", !showWideTap);
    this.touchControls.classList.remove("hidden");
  }
}


// ===== src/engine/SceneManager.js =====

class SceneManager {
  constructor({ gameData }) {
    this.gameData = gameData;
    this.currentSceneId = gameData.startScene;
  }

  get currentScene() {
    return this.gameData.scenes[this.currentSceneId];
  }

  setScene(sceneId) {
    if (!this.gameData.scenes[sceneId]) {
      throw new Error(`Unknown scene: ${sceneId}`);
    }
    this.currentSceneId = sceneId;
  }

  getStartPosition(sceneId = this.currentSceneId) {
    return this.gameData.scenes[sceneId].playerStart;
  }

  getCompanionStart(sceneId = this.currentSceneId) {
    return this.gameData.scenes[sceneId].companionStart;
  }

  getReturnPosition(sceneId = this.currentSceneId) {
    return this.gameData.scenes[sceneId].playerReturn || this.getStartPosition(sceneId);
  }

  getReturnCompanionPosition(sceneId = this.currentSceneId) {
    return this.gameData.scenes[sceneId].companionReturn || this.getCompanionStart(sceneId);
  }

  isBlocked(x, y) {
    if (x < 0 || y < 0 || x >= this.gameData.canvas.cols || y >= this.gameData.canvas.rows) {
      return true;
    }

    return this.tileListIncludes(this.currentScene.blockedTiles || [], x, y);
  }

  getFacingTile(actor) {
    const [dx, dy] = directionDelta(actor.facing);
    return { x: actor.x + dx, y: actor.y + dy };
  }

  tileListIncludes(tileList, x, y) {
    return Array.isArray(tileList) && tileList.some(([tx, ty]) => tx === x && ty === y);
  }

  getNpcs() {
    return this.currentScene.npcs || [];
  }

  getInteractables() {
    return this.currentScene.interactables || [];
  }

  getTriggers() {
    return this.currentScene.triggers || [];
  }
}


// ===== src/engine/InteractionManager.js =====
class InteractionManager {
  constructor({ sceneManager, actors }) {
    this.sceneManager = sceneManager;
    this.actors = actors;
    this.lastTriggerId = null;
  }

  getAdjacentNpc() {
    const target = this.sceneManager.getFacingTile(this.actors.player);
    return this.sceneManager.getNpcs().find((npc) => npc.x === target.x && npc.y === target.y) || null;
  }

  getFacingInteractable() {
    const target = this.sceneManager.getFacingTile(this.actors.player);

    return this.sceneManager.getInteractables().find((item) => {
      return this.sceneManager.tileListIncludes(item.tiles, target.x, target.y)
        || this.sceneManager.tileListIncludes(item.tiles, this.actors.player.x, this.actors.player.y);
    }) || null;
  }

  getCurrentTrigger() {
    const trigger = this.sceneManager.getTriggers().find((item) => {
      return this.sceneManager.tileListIncludes(item.tiles, this.actors.player.x, this.actors.player.y);
    });

    if (!trigger) {
      this.lastTriggerId = null;
      return null;
    }

    if (trigger.id === this.lastTriggerId) {
      return null;
    }

    this.lastTriggerId = trigger.id;
    return trigger;
  }

  resetTriggerMemory() {
    this.lastTriggerId = null;
  }
}


// ===== src/engine/DialogueManager.js =====
class DialogueManager {
  constructor({ uiManager, getDialogueById, onChoiceAction, onClose }) {
    this.ui = uiManager;
    this.getDialogueById = getDialogueById;
    this.onChoiceAction = onChoiceAction;
    this.onClose = onClose;

    this.activeDialogue = null;
    this.index = 0;
    this.selectedChoiceIndex = 0;
  }

  get isOpen() {
    return Boolean(this.activeDialogue);
  }

  get isChoiceOpen() {
    return this.isOpen
      && this.activeDialogue.choices
      && this.index >= this.activeDialogue.lines.length;
  }

  open(dialogueId) {
    const dialogue = this.getDialogueById(dialogueId);
    if (!dialogue) {
      throw new Error(`Dialogue not found: ${dialogueId}`);
    }

    this.activeDialogue = dialogue;
    this.index = 0;
    this.selectedChoiceIndex = 0;

    this.ui.showDialogue({
      speaker: dialogue.speaker,
      text: dialogue.lines[0] || "",
    });
  }

  advance() {
    if (!this.isOpen) return;

    if (this.isChoiceOpen) {
      this.confirmChoice();
      return;
    }

    this.index += 1;

    if (this.index < this.activeDialogue.lines.length) {
      this.ui.updateDialogueText(this.activeDialogue.lines[this.index]);
      return;
    }

    if (this.activeDialogue.choices && this.activeDialogue.choices.length) {
      this.openChoices();
      return;
    }

    this.close();
  }

  openChoices() {
    this.selectedChoiceIndex = 0;
    this.index = this.activeDialogue.lines.length;

    this.ui.showChoices(
      this.activeDialogue.choices.map((choice) => choice.label),
      this.selectedChoiceIndex,
      (index) => {
        this.selectedChoiceIndex = index;
        this.confirmChoice();
      }
    );
  }

  moveChoice(direction) {
    if (!this.isChoiceOpen) return false;

    const count = this.activeDialogue.choices.length;
    if (!count) return false;

    if (direction === "up") {
      this.selectedChoiceIndex = (this.selectedChoiceIndex - 1 + count) % count;
    } else if (direction === "down") {
      this.selectedChoiceIndex = (this.selectedChoiceIndex + 1) % count;
    } else {
      return false;
    }

    this.ui.syncChoiceSelection(this.selectedChoiceIndex);
    return true;
  }

  confirmChoice() {
    if (!this.isChoiceOpen) return false;

    const choice = this.activeDialogue.choices[this.selectedChoiceIndex];
    if (!choice) return false;

    // restart は会話管理そのものの操作なので、Game側の接続に依存させない。
    if (choice.action === "restart") {
      this.restart();
      return true;
    }

    let handled = false;
    if (choice.action && this.onChoiceAction) {
      handled = this.onChoiceAction(choice, this);
    }

    if (handled) return true;

    if (choice.close !== false) {
      this.close();
    }

    return true;
  }

  restart() {
    if (!this.activeDialogue) return;

    this.index = 0;
    this.selectedChoiceIndex = 0;
    this.ui.showDialogue({
      speaker: this.activeDialogue.speaker,
      text: this.activeDialogue.lines[0] || "",
    });
  }

  close() {
    this.activeDialogue = null;
    this.index = 0;
    this.selectedChoiceIndex = 0;
    this.ui.hideDialogue();
    this.onClose?.();
  }
}


// ===== src/engine/TileMapRenderer.js =====

class TileMapRenderer {
  constructor({ ctx, tilemaps, tileset = null }) {
    this.ctx = ctx;
    this.tilemaps = tilemaps;
    this.tileset = tileset;

    this.tiles = {
      0: { fill: "#5e7a4e" },
      1: { fill: "#3f5a36" },
      2: { fill: "#8c6b3f", detail: "path" },
      3: { fill: "#6e5232", detail: "path" },
      4: { fill: "#7a6f63", stroke: "#4f5964" },
      5: { fill: "#6e7681", stroke: "#4f5964" },
      6: { fill: "#6f5940", stroke: "rgba(34, 24, 18, 0.25)" },
      7: { fill: "#665039", stroke: "rgba(34, 24, 18, 0.25)" },
      8: { fill: "#2d3034" },
      9: { fill: "#7b4a2f" },
      10: { fill: "#5a3e2b" },
      11: { fill: "rgba(198, 163, 95, 0.26)", stroke: "rgba(198, 163, 95, 0.75)" },
      12: { fill: "#7a6f63", stroke: "#4f5964" },
    };
  }

  draw(sceneId) {
    const tilemap = this.tilemaps[sceneId];
    if (!tilemap) return false;

    this.activeTilemap = tilemap;

    for (const layer of tilemap.layers || []) {
      if (layer.type === "tile") {
        this.drawTileLayer(layer.data);
      }
    }

    this.activeTilemap = null;
    return true;
  }

  getTilesetForCurrentDraw() {
    if (this.activeTilemap?.tileset && this.tileset?.byId?.[this.activeTilemap.tileset]) {
      return this.tileset.byId[this.activeTilemap.tileset];
    }

    return this.tileset;
  }

  drawTileLayer(data) {
    for (let y = 0; y < data.length; y++) {
      const row = data[y];
      for (let x = 0; x < row.length; x++) {
        const tileId = row[x];
        if (tileId === null || tileId === undefined) continue;
        this.drawTile(tileId, x, y);
      }
    }
  }

  drawTile(tileId, x, y) {
    const px = x * TILE_SIZE;
    const py = y * TILE_SIZE;

    const currentTileset = this.getTilesetForCurrentDraw();
    const tileImage = currentTileset?.images?.[String(tileId)];
    if (tileImage) {
      this.ctx.drawImage(tileImage, px, py, TILE_SIZE, TILE_SIZE);
      return;
    }

    const tile = this.tiles[tileId] || this.tiles[0];

    this.ctx.fillStyle = tile.fill;
    this.ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);

    if (tile.stroke) {
      this.ctx.strokeStyle = tile.stroke;
      this.ctx.strokeRect(px + 1, py + 1, TILE_SIZE - 2, TILE_SIZE - 2);
    }

    if (tile.detail === "path") {
      this.ctx.fillStyle = "rgba(255,255,255,0.08)";
      this.ctx.fillRect(px + 2, py + 7, 10, 1);
    }
  }
}


// ===== src/engine/Renderer.js =====


class Renderer {
  constructor({ canvas, sceneManager, actors, images, tilemaps = {}, tileset = null }) {
    this.canvas = canvas;
    this.ctx = canvas.getContext("2d");
    this.ctx.imageSmoothingEnabled = false;

    this.sceneManager = sceneManager;
    this.actors = actors;
    this.images = images;
    this.tileMapRenderer = new TileMapRenderer({ ctx: this.ctx, tilemaps, tileset });

    this.palette = {
      grass: "#5e7a4e",
      grassDark: "#3f5a36",
      dirt: "#8c6b3f",
      dirtDark: "#6e5232",
      stone: "#6e7681",
      stoneDark: "#4f5964",
      wall: "#7a6f63",
      roof: "#7b4a2f",
      wood: "#5a3e2b",
    };
  }

  draw() {
    this.drawBaseMap();
    this.drawObjects();
    this.drawCharacters();
  }

  drawBaseMap() {
    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

    const scene = this.sceneManager.currentScene;
    const drawn = this.tileMapRenderer.draw(scene.id);
    if (drawn) return;

    // Fallback for scenes that do not yet have tilemap data.
    if (scene.renderer === "interior") {
      this.drawInteriorMap();
    } else {
      this.drawVillageMap();
    }
  }

  drawVillageMap() {
    for (let y = 0; y < 30; y++) {
      for (let x = 0; x < 20; x++) {
        const px = x * TILE_SIZE;
        const py = y * TILE_SIZE;

        if (y < 6) {
          this.ctx.fillStyle = this.palette.wall;
        } else if (x >= 7 && x <= 12) {
          this.ctx.fillStyle = y % 2 === 0 ? this.palette.dirt : this.palette.dirtDark;
        } else if ((x + y) % 7 === 0) {
          this.ctx.fillStyle = this.palette.grassDark;
        } else {
          this.ctx.fillStyle = this.palette.grass;
        }

        this.ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);

        if (x >= 7 && x <= 12 && y >= 6 && y <= 27) {
          this.ctx.fillStyle = "rgba(255,255,255,0.08)";
          this.ctx.fillRect(px + 2, py + 7, 10, 1);
        }
      }
    }

    for (let y = 8; y <= 12; y++) {
      for (let x = 8; x <= 11; x++) {
        this.ctx.fillStyle = this.palette.stone;
        this.ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
        this.ctx.strokeStyle = this.palette.stoneDark;
        this.ctx.strokeRect(x * TILE_SIZE + 1, y * TILE_SIZE + 1, TILE_SIZE - 2, TILE_SIZE - 2);
      }
    }
  }

  drawInteriorMap() {
    this.ctx.fillStyle = "#2d3034";
    this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

    for (let y = 5; y <= 26; y++) {
      for (let x = 3; x <= 16; x++) {
        const px = x * TILE_SIZE;
        const py = y * TILE_SIZE;
        this.ctx.fillStyle = (x + y) % 2 === 0 ? "#6f5940" : "#665039";
        this.ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
        this.ctx.strokeStyle = "rgba(34, 24, 18, 0.25)";
        this.ctx.strokeRect(px, py, TILE_SIZE, TILE_SIZE);
      }
    }

    this.rect(3, 5, 14, 3, this.palette.wall);
    this.rect(8, 17, 4, 1, this.palette.wood);
    this.rect(5, 9, 3, 2, "#5a3e2b");
    this.rect(12, 9, 3, 2, "#5a3e2b");
    this.rect(4, 15, 3, 1, this.palette.stone);
    this.rect(13, 15, 3, 1, "#4a4a4a");

    this.ctx.fillStyle = "rgba(198, 163, 95, 0.26)";
    this.ctx.fillRect(9 * TILE_SIZE, 25 * TILE_SIZE, TILE_SIZE * 2, TILE_SIZE * 2);
    this.ctx.strokeStyle = "rgba(198, 163, 95, 0.75)";
    this.ctx.strokeRect(9 * TILE_SIZE + 1, 25 * TILE_SIZE + 1, TILE_SIZE * 2 - 2, TILE_SIZE * 2 - 2);
  }

  drawObjects() {
    const scene = this.sceneManager.currentScene;

    // Tilemap scenes already include prototype object layers.
    if (this.tileMapRenderer.tilemaps[scene.id]) return;

    if (scene.renderer !== "village") return;

    this.drawHouse(4, 1, 12, 6);

    for (let y = 10; y <= 15; y++) {
      for (let x = 13; x <= 16; x++) {
        this.ctx.fillStyle = this.palette.dirtDark;
        this.ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
        this.ctx.strokeStyle = "rgba(0,0,0,0.2)";
        this.ctx.beginPath();
        this.ctx.moveTo(x * TILE_SIZE + 2, y * TILE_SIZE + 4);
        this.ctx.lineTo(x * TILE_SIZE + 14, y * TILE_SIZE + 12);
        this.ctx.stroke();
      }
    }

    this.drawWell(4, 13);
    this.rect(14, 8, 1, 1, this.palette.wood);
    this.rect(15, 8, 1, 1, this.palette.wood);
    this.rect(3, 17, 1, 1, this.palette.roof);

    this.ctx.fillStyle = "#d8d5cf";
    this.ctx.fillRect(9 * TILE_SIZE, 6 * TILE_SIZE, TILE_SIZE * 2, 2);

    this.ctx.fillStyle = "rgba(198, 163, 95, 0.18)";
    this.ctx.fillRect(8 * TILE_SIZE, 8 * TILE_SIZE, TILE_SIZE * 4, TILE_SIZE * 2);
    this.ctx.strokeStyle = "rgba(198, 163, 95, 0.65)";
    this.ctx.strokeRect(8 * TILE_SIZE + 1, 8 * TILE_SIZE + 1, TILE_SIZE * 4 - 2, TILE_SIZE * 2 - 2);
  }

  drawCharacters() {
    const npcs = this.sceneManager.getNpcs().map((npc) => ({
      type: "npc",
      x: npc.x,
      y: npc.y,
      image: this.images[npc.spriteKey],
    }));

    const drawable = [
      {
        type: "companion",
        x: this.actors.companion.x,
        y: this.actors.companion.y,
        image: (this.images.companionDirections?.[this.actors.companion.facing] || this.images.companion)[this.actors.companion.frame],
      },
      ...npcs,
      {
        type: "player",
        x: this.actors.player.x,
        y: this.actors.player.y,
        image: (this.images.playerDirections?.[this.actors.player.facing] || this.images.player)[this.actors.player.step],
      },
    ];

    drawable.sort((a, b) => a.y - b.y);
    drawable.forEach((item) => this.drawCharacter(item));
  }

  drawCharacter(item) {
    if (item.image) {
      const isHuman = item.type === "player" || item.type === "npc";
      const w = isHuman ? 16 : 24;
      const h = isHuman ? 32 : 24;
      const dx = item.x * TILE_SIZE + (TILE_SIZE - w) / 2;
      const dy = item.y * TILE_SIZE + TILE_SIZE - h;
      this.ctx.drawImage(item.image, dx, dy, w, h);
      return;
    }

    this.drawFallbackCharacter(item);
  }

  drawFallbackCharacter(item) {
    const px = item.x * TILE_SIZE;
    const py = item.y * TILE_SIZE;

    if (item.type === "companion") {
      this.ctx.fillStyle = "#a7834f";
      this.ctx.fillRect(px - 4, py, 24, 16);
      this.ctx.fillStyle = "#4f8a5b";
      this.ctx.fillRect(px + 6, py + 4, 8, 3);
      return;
    }

    this.ctx.fillStyle = item.type === "npc" ? "#6b7c8c" : "#4f8a5b";
    this.ctx.fillRect(px + 2, py - 16, 12, 32);
    this.ctx.fillStyle = "#7b4a2f";
    this.ctx.fillRect(px + 3, py - 18, 10, 8);
  }

  drawHouse(x, y, w, h) {
    const px = x * TILE_SIZE;
    const py = y * TILE_SIZE;

    this.ctx.fillStyle = this.palette.roof;
    this.ctx.fillRect(px - TILE_SIZE, py, (w + 2) * TILE_SIZE, TILE_SIZE * 2);

    this.ctx.fillStyle = this.palette.wood;
    this.ctx.fillRect(px - TILE_SIZE, py + TILE_SIZE, (w + 2) * TILE_SIZE, 4);

    this.ctx.fillStyle = this.palette.wall;
    this.ctx.fillRect(px, py + TILE_SIZE * 2, w * TILE_SIZE, h * TILE_SIZE);

    this.ctx.strokeStyle = this.palette.stoneDark;
    for (let row = 0; row < h; row++) {
      for (let col = 0; col < w; col++) {
        this.ctx.strokeRect(px + col * TILE_SIZE, py + TILE_SIZE * 2 + row * TILE_SIZE, TILE_SIZE, TILE_SIZE);
      }
    }

    this.rect(x + 5, y + 4, 2, 3, this.palette.wood);
    this.rect(x + 2, y + 3, 2, 2, "#6b7c8c");
    this.rect(x + 8, y + 3, 2, 2, "#6b7c8c");
  }

  drawWell(x, y) {
    this.ctx.fillStyle = this.palette.stoneDark;
    this.ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE * 2, TILE_SIZE * 2);
    this.ctx.fillStyle = "#303945";
    this.ctx.fillRect(x * TILE_SIZE + 7, y * TILE_SIZE + 6, TILE_SIZE, TILE_SIZE);
    this.ctx.strokeStyle = "#1f2429";
    this.ctx.strokeRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE * 2, TILE_SIZE * 2);
  }

  rect(x, y, w, h, color) {
    this.ctx.fillStyle = color;
    this.ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, w * TILE_SIZE, h * TILE_SIZE);
  }
}


// ===== src/engine/LayoutManager.js =====
class LayoutManager {
  constructor({ root = document.documentElement } = {}) {
    this.root = root;
    this.resizeTimer = null;
    this.boundUpdate = () => this.scheduleUpdate();
  }

  bind() {
    this.updateAppHeight();

    window.addEventListener("resize", this.boundUpdate, { passive: true });
    window.addEventListener("orientationchange", this.boundUpdate, { passive: true });

    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", this.boundUpdate, { passive: true });
      window.visualViewport.addEventListener("scroll", this.boundUpdate, { passive: true });
    }

    setTimeout(() => this.updateAppHeight(), 80);
    setTimeout(() => this.updateAppHeight(), 240);
    setTimeout(() => this.updateAppHeight(), 600);
  }

  scheduleUpdate() {
    if (this.resizeTimer) {
      clearTimeout(this.resizeTimer);
    }

    this.updateAppHeight();
    this.resizeTimer = setTimeout(() => {
      this.updateAppHeight();
      this.resizeTimer = null;
    }, 180);
  }

  updateAppHeight() {
    const viewportHeight = window.visualViewport?.height || window.innerHeight;
    this.root.style.setProperty("--app-height", `${Math.round(viewportHeight)}px`);
  }
}


// ===== src/engine/FlagManager.js =====
class FlagManager {
  constructor({ chapterProgress = {} } = {}) {
    this.mainFlags = chapterProgress.mainFlags || [];
    this.currentMainFlag = chapterProgress.currentMainFlag || this.mainFlags[0] || null;
    this.flags = new Set(chapterProgress.flags || []);
    if (this.currentMainFlag) {
      this.flags.add(this.currentMainFlag);
    }
  }

  getMainFlag() {
    return this.currentMainFlag;
  }

  setMainFlag(flag) {
    if (!flag) return;
    this.currentMainFlag = flag;
    this.flags.add(flag);
  }

  hasFlag(flag) {
    return this.flags.has(flag);
  }

  setFlag(flag) {
    if (!flag) return;
    this.flags.add(flag);
  }

  clearFlag(flag) {
    this.flags.delete(flag);
  }

  hasReached(flag) {
    const targetIndex = this.mainFlags.indexOf(flag);
    const currentIndex = this.mainFlags.indexOf(this.currentMainFlag);

    if (targetIndex === -1 || currentIndex === -1) {
      return this.hasFlag(flag);
    }

    return currentIndex >= targetIndex;
  }

  getObjective(objectives = {}) {
    return objectives[this.currentMainFlag] || "";
  }

  toJSON() {
    return {
      currentMainFlag: this.currentMainFlag,
      flags: Array.from(this.flags),
    };
  }
}


// ===== src/engine/MenuManager.js =====
class MenuManager {
  constructor({ uiManager, gameData, flagManager, onReadKeyItem, getState }) {
    this.ui = uiManager;
    this.gameData = gameData;
    this.flagManager = flagManager;
    this.onReadKeyItem = onReadKeyItem;
    this.getState = getState;
    this.isOpen = false;
    this.currentTab = "items";

    this.menuButton = document.getElementById("menu-button");
    this.menuLayer = document.getElementById("menu-layer");
    this.closeButton = document.getElementById("menu-close-button");
    this.content = document.getElementById("menu-content");
    this.tabs = Array.from(document.querySelectorAll(".menu-tab"));
  }

  bind() {
    this.menuButton.addEventListener("click", (event) => {
      event.preventDefault();
      this.open();
    });

    this.closeButton.addEventListener("click", (event) => {
      event.preventDefault();
      this.close();
    });

    this.tabs.forEach((tab) => {
      tab.addEventListener("click", (event) => {
        event.preventDefault();
        this.selectTab(tab.dataset.menuTab);
      });
    });

    this.render();
  }

  open() {
    this.isOpen = true;
    this.menuLayer.classList.remove("hidden");
    document.body.classList.add("menu-open");
    this.render();
  }

  close() {
    this.isOpen = false;
    this.menuLayer.classList.add("hidden");
    document.body.classList.remove("menu-open");
  }

  toggle() {
    if (this.isOpen) {
      this.close();
    } else {
      this.open();
    }
  }

  selectTab(tabId) {
    this.currentTab = tabId;
    this.tabs.forEach((tab) => {
      tab.classList.toggle("selected", tab.dataset.menuTab === tabId);
    });
    this.render();
  }

  render() {
    if (!this.content) return;

    const renderers = {
      items: () => this.renderItems(),
      keyItems: () => this.renderKeyItems(),
      equipment: () => this.renderEquipment(),
      status: () => this.renderStatus(),
      save: () => this.renderSave(),
      settings: () => this.renderSettings(),
    };

    this.content.innerHTML = renderers[this.currentTab]?.() || "";
    this.bindDynamicContentEvents();
  }

  renderItems() {
    const inventory = this.gameData.player?.inventory || [];
    if (!inventory.length) {
      return `
        <h2 class="menu-panel-title">アイテム</h2>
        <p class="menu-muted">まだアイテムを持っていない。</p>
      `;
    }

    const itemRows = inventory.map((entry) => {
      const item = this.gameData.items?.[entry.itemId] || { name: entry.itemId, description: "" };
      return `
        <li class="menu-list-item">
          <strong>${item.name}</strong> × ${entry.count}
          <br><span class="menu-muted">${item.description || ""}</span>
        </li>
      `;
    }).join("");

    return `
      <h2 class="menu-panel-title">アイテム</h2>
      <ul class="menu-list">${itemRows}</ul>
    `;
  }

  renderEquipment() {
    const equipment = this.gameData.player?.equipment || {};
    const slots = this.gameData.equipmentSlots || [];

    const rows = slots.map((slot) => {
      const itemId = equipment[slot.id];
      const item = itemId ? this.gameData.items?.[itemId] : null;
      return `
        <li class="menu-list-item">
          <strong>${slot.label}</strong>：${item ? item.name : "なし"}
        </li>
      `;
    }).join("");

    return `
      <h2 class="menu-panel-title">装備</h2>
      <ul class="menu-list">${rows}</ul>
      <p class="menu-muted">装備変更は次段階で実装予定。</p>
    `;
  }

  renderStatus() {
    const status = this.gameData.player?.status || {};
    const name = this.gameData.player?.name || "主人公";

    const rows = Object.entries(status).map(([key, value]) => {
      return `<span>${this.statusLabel(key)}</span><strong>${value}</strong>`;
    }).join("");

    return `
      <h2 class="menu-panel-title">${name}</h2>
      <div class="menu-status-grid">${rows}</div>
    `;
  }

  renderSave() {
    const state = this.getState();
    const sceneName = state?.sceneName || "不明";

    return `
      <h2 class="menu-panel-title">記録</h2>
      <p>現在地：${sceneName}</p>
      <p class="menu-muted">セーブ / ロードは次段階で実装予定。</p>
      <ul class="menu-list">
        <li class="menu-list-item">記録する：未実装</li>
        <li class="menu-list-item">記録を読む：未実装</li>
      </ul>
    `;
  }

  renderSettings() {
    return `
      <h2 class="menu-panel-title">設定</h2>
      <ul class="menu-list">
        <li class="menu-list-item">音量：未実装</li>
        <li class="menu-list-item">文字速度：未実装</li>
        <li class="menu-list-item">操作設定：未実装</li>
      </ul>
    `;
  }

  statusLabel(key) {
    return {
      hp: "体力",
      strength: "力",
      defense: "守り",
      speed: "速さ",
      sense: "感覚",
    }[key] || key;
  }
}


// ===== src/engine/Game.js =====











class Game {
  constructor({ canvas, dataPath, version = ENGINE_VERSION }) {
    this.canvas = canvas;
    this.dataPath = dataPath;
    this.assetLoader = new AssetLoader({ version });
    this.ui = new UIManager();
    this.layoutManager = new LayoutManager();

    this.actors = {
      player: { x: 0, y: 0, facing: "down", step: 0 },
      companion: { x: 0, y: 0, facing: "down", frame: 0 },
    };

    this.images = {
      player: [],
      companion: [],
    };

    this.noticeOpen = false;
  }

  async boot() {
    this.ui.setDebugVersion("v3.4 Single");
    this.layoutManager.bind();

    this.gameData = await this.assetLoader.loadJSON(this.dataPath);
    this.flagManager = new FlagManager({ chapterProgress: this.gameData.chapterProgress });
    this.sceneManager = new SceneManager({ gameData: this.gameData });

    this.resetActorsToSceneStart(this.gameData.startScene);

    this.interactionManager = new InteractionManager({
      sceneManager: this.sceneManager,
      actors: this.actors,
    });

    this.dialogueManager = new DialogueManager({
      uiManager: this.ui,
      getDialogueById: (id) => this.gameData.dialogues[id],
      onChoiceAction: (choice, dialogueManager) => this.handleChoiceAction(choice, dialogueManager),
      onClose: () => {
        this.syncUI();
        this.updateActionButtonLabel();
      },
    });

    await this.loadAssets();
    await this.loadTileset();
    await this.loadTilemaps();

    this.renderer = new Renderer({
      canvas: this.canvas,
      sceneManager: this.sceneManager,
      actors: this.actors,
      images: this.images,
      tilemaps: this.tilemaps,
      tileset: this.tileset,
    });

    this.menuManager = new MenuManager({
      uiManager: this.ui,
      gameData: this.gameData,
      flagManager: this.flagManager,
      onReadKeyItem: (itemId) => this.readKeyItem(itemId),
      getState: () => ({
        sceneId: this.sceneManager.currentSceneId,
        sceneName: this.sceneManager.currentScene?.name || this.sceneManager.currentSceneId,
      }),
    });
    this.menuManager.bind();

    this.input = new InputController({
      onDirection: (direction) => this.handleDirection(direction),
      onAction: () => this.interact(),
      onWideTap: () => this.handleWideTap(),
    });
    this.input.bind();

    this.syncUI();
    this.updateActionButtonLabel();
    requestAnimationFrame(() => this.loop());
  }

  async loadTileset() {
    this.tileset = null;

    const loadOneTileset = async (path) => {
      const tileset = await this.assetLoader.loadJSON(path);
      const images = {};

      for (const [tileId, imagePath] of Object.entries(tileset.tiles || {})) {
        images[tileId] = await this.assetLoader.loadImage(imagePath);
      }

      return {
        ...tileset,
        images,
      };
    };

    let primary = null;
    const byId = {};

    if (this.gameData.tileset) {
      primary = await loadOneTileset(this.gameData.tileset);
      byId[primary.id] = primary;
    }

    for (const path of Object.values(this.gameData.tilesets || {})) {
      const loaded = await loadOneTileset(path);
      byId[loaded.id] = loaded;
    }

    this.tileset = {
      ...(primary || {}),
      byId,
    };
  }

  async loadTilemaps() {
    this.tilemaps = {};

    const entries = Object.entries(this.gameData.tilemaps || {});
    for (const [sceneId, path] of entries) {
      this.tilemaps[sceneId] = await this.assetLoader.loadJSON(path);
    }
  }

  async loadAssets() {
    this.images.player = await this.assetLoader.loadImageList(this.gameData.assets.player);
    this.images.companion = await this.assetLoader.loadImageList(this.gameData.assets.companion);

    this.images.playerDirections = {};
    for (const [direction, paths] of Object.entries(this.gameData.assets.playerDirectionFrames || {})) {
      this.images.playerDirections[direction] = await this.assetLoader.loadImageList(paths);
    }

    this.images.companionDirections = {};
    for (const [direction, paths] of Object.entries(this.gameData.assets.companionDirectionFrames || {})) {
      this.images.companionDirections[direction] = await this.assetLoader.loadImageList(paths);
    }

    for (const [key, path] of Object.entries(this.gameData.assets.npcs || {})) {
      this.images[key] = await this.assetLoader.loadImage(path);
    }
  }

  resetActorsToSceneStart(sceneId) {
    const scene = this.gameData.scenes[sceneId];
    this.sceneManager?.setScene(sceneId);

    const playerStart = scene.playerStart;
    const companionStart = scene.companionStart;

    this.actors.player.x = playerStart.x;
    this.actors.player.y = playerStart.y;
    this.actors.player.facing = playerStart.facing || "down";

    this.actors.companion.x = companionStart.x;
    this.actors.companion.y = companionStart.y;
  }

  handleDirection(direction) {
    if (this.menuManager?.isOpen) return;

    if (this.dialogueManager?.isChoiceOpen) {
      this.dialogueManager.moveChoice(direction);
      this.syncUI();
      this.updateActionButtonLabel();
      return;
    }

    this.movePlayer(direction);
  }

  movePlayer(direction) {
    if (this.dialogueManager.isOpen || this.noticeOpen) return;

    this.actors.player.facing = direction;

    const [dx, dy] = directionDelta(direction);
    const nextX = this.actors.player.x + dx;
    const nextY = this.actors.player.y + dy;

    if (this.sceneManager.isBlocked(nextX, nextY)) {
      this.updateActionButtonLabel();
      return;
    }

    const oldX = this.actors.player.x;
    const oldY = this.actors.player.y;

    this.actors.player.x = nextX;
    this.actors.player.y = nextY;
    this.actors.player.step = (this.actors.player.step + 1) % this.images.player.length;

    this.updateCompanionPosition(oldX, oldY);
    this.checkTriggers();
    this.updateActionButtonLabel();
  }

  updateCompanionPosition(oldPlayerX, oldPlayerY) {
    this.actors.companion.x = oldPlayerX;
    this.actors.companion.y = oldPlayerY + 1 <= this.gameData.canvas.rows - 2 && !this.sceneManager.isBlocked(oldPlayerX, oldPlayerY + 1)
      ? oldPlayerY + 1
      : oldPlayerY;
    this.actors.companion.facing = this.actors.player.facing;

    const frames = this.images.companionDirections?.[this.actors.companion.facing] || this.images.companion;
    this.actors.companion.frame = (this.actors.companion.frame + 1) % frames.length;
  }

  interact() {
    if (this.menuManager?.isOpen) {
      this.menuManager.close();
      return;
    }

    if (this.noticeOpen) {
      this.closeNotice();
      return;
    }

    if (this.dialogueManager?.isChoiceOpen) {
      this.dialogueManager.confirmChoice();
      this.syncUI();
      this.updateActionButtonLabel();
      return;
    }

    if (this.dialogueManager?.isOpen) {
      this.dialogueManager.advance();
      this.syncUI();
      this.updateActionButtonLabel();
      return;
    }

    const npc = this.interactionManager.getAdjacentNpc();
    if (npc) {
      this.dialogueManager.open(npc.dialogueId);
      this.syncUI();
      this.updateActionButtonLabel();
      return;
    }

    const interactable = this.interactionManager.getFacingInteractable();
    if (interactable) {
      this.handleInteractable(interactable);
    }
  }

  readKeyItem(itemId) {
    const keyItem = this.gameData.keyItems?.[itemId];
    if (!keyItem || !keyItem.readable) return false;

    if (itemId === "mothers_note" && !this.flagManager.hasReached("CH1_02_READ_MOTHERS_NOTE")) {
      this.flagManager.setMainFlag("CH1_02_READ_MOTHERS_NOTE");
    }

    this.menuManager?.render();
    this.syncUI();
    this.updateActionButtonLabel();
    return true;
  }

  handleChoiceAction(choice, dialogueManager) {
    if (!choice || !choice.action) return false;

    if (choice.action === "restart") {
      dialogueManager.restart();
      this.syncUI();
      this.updateActionButtonLabel();
      return true;
    }

    if (choice.action === "notice") {
      dialogueManager.close();
      this.showNotice(choice.text || "");
      return true;
    }

    if (choice.action === "transition") {
      dialogueManager.close();
      this.transitionScene(choice.targetScene);
      return true;
    }

    return false;
  }

  handleInteractable(interactable) {
    if (interactable.requiredFlag && !this.flagManager.hasReached(interactable.requiredFlag)) {
      this.showNotice(interactable.blockedText || "まだできない。");
      return;
    }

    if (interactable.kind === "notice") {
      this.showNotice(interactable.text || `${interactable.name}を調べた。`);
      return;
    }

    if (interactable.kind === "readKeyItem") {
      this.readKeyItem(interactable.keyItemId);
      this.showNotice(interactable.afterText || `${interactable.name}を読んだ。`);
      return;
    }

    if (interactable.kind === "sceneTransition") {
      this.transitionScene(interactable.targetScene);
      return;
    }

    this.showNotice(interactable.text || `${interactable.name}を調べた。`);
  }

  handleWideTap() {
    if (this.noticeOpen) {
      this.closeNotice();
      return;
    }

    if (this.dialogueManager.isOpen && !this.dialogueManager.isChoiceOpen) {
      this.dialogueManager.advance();
      this.syncUI();
      this.updateActionButtonLabel();
    }
  }

  checkTriggers() {
    if (this.noticeOpen || this.dialogueManager.isOpen) return;

    const trigger = this.interactionManager.getCurrentTrigger();
    if (!trigger) return;

    if (trigger.type === "notice") {
      this.showNotice(trigger.text);
    }
  }

  showNotice(text) {
    this.noticeOpen = true;
    this.ui.showNotice(text);
    this.syncUI();
    this.updateActionButtonLabel();
  }

  closeNotice() {
    if (!this.noticeOpen) return;
    this.noticeOpen = false;
    this.ui.hideNotice();
    this.syncUI();
    this.updateActionButtonLabel();
  }

  transitionScene(targetScene) {
    this.closeNotice();
    this.sceneManager.setScene(targetScene);
    this.interactionManager.resetTriggerMemory();

    const playerStart = this.sceneManager.getStartPosition(targetScene);
    const companionStart = this.sceneManager.getCompanionStart(targetScene);

    this.actors.player.x = playerStart.x;
    this.actors.player.y = playerStart.y;
    this.actors.player.facing = playerStart.facing || "down";

    this.actors.companion.x = companionStart.x;
    this.actors.companion.y = companionStart.y;

    const message = this.sceneManager.currentScene.enterNotice;
    if (message) {
      this.showNotice(message);
    } else {
      this.syncUI();
      this.updateActionButtonLabel();
    }
  }

  syncUI() {
    this.ui.syncBodyState({
      dialogueOpen: this.dialogueManager?.isOpen || false,
      choiceOpen: this.dialogueManager?.isChoiceOpen || false,
      noticeOpen: this.noticeOpen,
    });
  }

  updateActionButtonLabel() {
    if (this.dialogueManager?.isChoiceOpen) {
      this.ui.setActionButton("選ぶ", "action-talk");
      return;
    }

    if (this.dialogueManager?.isOpen) {
      this.ui.setActionButton("送る");
      return;
    }

    if (this.noticeOpen) {
      this.ui.setActionButton("閉じる");
      return;
    }

    const npc = this.interactionManager?.getAdjacentNpc();
    if (npc) {
      this.ui.setActionButton("話す", "action-talk");
      return;
    }

    const interactable = this.interactionManager?.getFacingInteractable();
    if (interactable) {
      const label = interactable.actionLabel || "調べる";
      this.ui.setActionButton(label, label === "出る" ? "action-exit" : "action-enter");
      return;
    }

    this.ui.setActionButton("…", "action-idle");
  }

  loop() {
    this.renderer.draw();
    requestAnimationFrame(() => this.loop());
  }
}

AssetLoader.prototype.normalizePath = function(path) {
  return String(path || "").split("?")[0].replace(/^\.\//, "");
};

AssetLoader.prototype.loadJSON = async function(path) {
  const key = this.normalizePath(path);
  if (EMBEDDED_JSON[key]) {
    return JSON.parse(JSON.stringify(EMBEDDED_JSON[key]));
  }
  throw new Error(`Embedded JSON not found: ${key}`);
};

AssetLoader.prototype.loadImage = async function(path) {
  const key = this.normalizePath(path);
  if (this.cache.has(key)) {
    return this.cache.get(key);
  }

  const dataUrl = EMBEDDED_IMAGES[key];
  if (!dataUrl) {
    console.warn("Embedded image not found:", key);
    return null;
  }

  const promise = new Promise((resolve) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => {
      console.warn("Embedded image failed:", key);
      resolve(null);
    };
    img.src = dataUrl;
  });

  this.cache.set(key, promise);
  return promise;
};

window.addEventListener("error", (event) => {
  const panel = document.getElementById("debug-panel");
  if (panel) {
    panel.innerHTML = `<strong>ERROR</strong><span>${event.message}</span>`;
    panel.style.background = "rgba(120, 0, 0, 0.9)";
  }
});

window.addEventListener("unhandledrejection", (event) => {
  const panel = document.getElementById("debug-panel");
  if (panel) {
    panel.innerHTML = `<strong>ERROR</strong><span>${event.reason?.message || event.reason}</span>`;
    panel.style.background = "rgba(120, 0, 0, 0.9)";
  }
});

const canvas = document.getElementById("game-canvas");
const game = new Game({
  canvas,
  dataPath: "src/game/data/matsuyoi.game.json",
  version: "3.4-single",
});

game.boot().catch((error) => {
  console.error("Game boot failed:", error);
  const panel = document.getElementById("debug-panel");
  if (panel) {
    panel.innerHTML = `<strong>BOOT ERROR</strong><span>${error.message}</span>`;
    panel.style.background = "rgba(120, 0, 0, 0.9)";
  }
});
