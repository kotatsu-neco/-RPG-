<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>待宵物語</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="titleScreen" class="screen active">
      <div class="titlePanel">
        <div class="eyebrow">スマホ向けブラウザRPG 試作実装版</div>
        <h1>待宵物語</h1>
        <p>ガーガル村の導入を、実装優先で安定化した初回再構築版です。</p>
        <button id="newGameBtn">はじめから</button>
        <button id="continueBtn">つづきから</button>
        <div class="smallNote">
          下の十字ボタンで移動できます。<br>
          会話中は操作がロックされ、十字キーがグレーアウトします。<br>
          現在は「自宅開始 → 外へ出る → 村を歩く → ルルガー家へ入る」までを実装しています。
        </div>
      </div>
    </div>

    <div id="gameScreen" class="screen">
      <div id="hudTop">
        <div id="objectiveBox"></div>
        <button id="resetBtn" class="hudBtn">タイトルへ</button>
      </div>

      <div id="viewportWrap">
        <canvas id="gameCanvas" width="720" height="540"></canvas>
        <button id="interactBtn">調べる</button>
      </div>

      <div id="dialogueBox" class="hidden">
        <div id="dialogueName"></div>
        <div id="dialogueText"></div>
        <button id="nextDialogueBtn">つぎへ</button>
      </div>

      <div id="controls">
        <div class="dpad">
          <button data-dir="up">▲</button>
          <div class="midrow">
            <button data-dir="left">◀</button>
            <button data-dir="down">▼</button>
            <button data-dir="right">▶</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
