<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>待宵物語 RPG Engine v2.1</title>
  <link rel="stylesheet" href="src/style.css?v=2.1">
</head>
<body>
  <main id="app">
    <section id="game-shell" aria-label="待宵物語 RPG Engine v2.1">
      <canvas id="game-canvas" width="320" height="480" aria-label="ゲーム画面"></canvas>

      <aside id="debug-panel">
        <strong>v2.1 Engine</strong>
        <span>汎用RPG基盤</span>
      </aside>

      <div id="dialog-layer" class="hidden" aria-live="polite">
        <div id="nameplate"></div>
        <div id="dialog-window">
          <p id="dialog-text"></p>
          <div id="choice-box" class="hidden" role="group" aria-label="会話選択肢"></div>
          <span id="next-marker">▼</span>
        </div>
      </div>

      <button id="wide-tap-catcher" class="hidden" type="button" aria-label="会話または通知を進める"></button>

      <button id="notice-layer" class="hidden" type="button" aria-live="polite" aria-label="通知を閉じる">
        <span id="notice-window"></span>
      </button>

      <nav id="touch-controls" aria-label="移動操作">
        <div class="dpad" aria-label="十字キー">
          <button data-dir="up" aria-label="上" type="button">▲</button>
          <button data-dir="left" aria-label="左" type="button">◀</button>
          <button data-dir="right" aria-label="右" type="button">▶</button>
          <button data-dir="down" aria-label="下" type="button">▼</button>
        </div>
        <button id="action-button" aria-label="決定" type="button">決定</button>
      </nav>
    </section>
  </main>

  <script type="module" src="src/main.js?v=2.1"></script>
</body>
</html>
