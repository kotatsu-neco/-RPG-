<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>待宵物語 RPG Engine v2.7</title>
  <link rel="stylesheet" href="src/style.css?v=2.7">
</head>
<body>
  <main id="app">
    <section id="game-shell" aria-label="待宵物語 RPG Engine v2.7">
      <canvas id="game-canvas" width="320" height="480" aria-label="ゲーム画面"></canvas>

      <aside id="debug-panel">
        <strong>v2.7 Engine</strong>
        <span>汎用RPG基盤</span>
      </aside>

      <button id="menu-button" type="button" aria-label="メニューを開く">☰</button>

      <section id="menu-layer" class="hidden" aria-label="メニュー">
        <div id="menu-window">
          <header id="menu-header">
            <h1>メニュー</h1>
            <button id="menu-close-button" type="button" aria-label="メニューを閉じる">×</button>
          </header>

          <div id="menu-tabs" role="tablist" aria-label="メニュー項目">
            <button class="menu-tab selected" data-menu-tab="items" type="button">アイテム</button>
            <button class="menu-tab" data-menu-tab="equipment" type="button">装備</button>
            <button class="menu-tab" data-menu-tab="status" type="button">ステータス</button>
            <button class="menu-tab" data-menu-tab="save" type="button">記録</button>
            <button class="menu-tab" data-menu-tab="settings" type="button">設定</button>
          </div>

          <div id="menu-content" aria-live="polite"></div>
        </div>
      </section>

      <div id="dialog-layer" class="hidden" aria-live="polite">
        <div id="nameplate"></div>
        <div id="dialog-window">
          <p id="dialog-text"></p>
          <div id="choice-box" class="hidden" role="group" aria-label="会話選択肢"></div>
          <span id="next-marker">▼</span>
        </div>
      </div>

      <button id="wide-tap-catcher" class="hidden" type="button" aria-label="会話または通知を進める"></button>

      <button id="notice-layer" class="hidden" type="button" aria-live="polite" aria-label="通知を閉じる">
        <span id="notice-window"></span>
      </button>

      <nav id="touch-controls" aria-label="移動操作">
        <div class="dpad" aria-label="十字キー">
          <button data-dir="up" aria-label="上" type="button">▲</button>
          <button data-dir="left" aria-label="左" type="button">◀</button>
          <button data-dir="right" aria-label="右" type="button">▶</button>
          <button data-dir="down" aria-label="下" type="button">▼</button>
        </div>
        <button id="action-button" aria-label="決定" type="button">決定</button>
      </nav>
    </section>
  </main>

  <script type="module" src="src/main.js?v=2.7"></script>
</body>
</html>
